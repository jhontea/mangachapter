# Wrangler configuration untuk Scheduler Worker
# Deploy: npx wrangler deploy src/scheduler.js --name mangachapter-scheduler --config scheduler-wrangler.toml

name = "mangachapter-scheduler"
main = "src/scheduler.js"
compatibility_date = "2024-01-01"

# D1 Database binding (sama seperti Pages)
[[d1_databases]]
binding = "DB"
database_name = "mangachapter-db"
database_id = "76305911-a6dc-4caa-84c9-86f5d5071107"

# Cron Triggers - setiap jam
[triggers]
crons = ["0 * * * *"]