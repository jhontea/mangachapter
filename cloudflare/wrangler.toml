# Wrangler configuration for Manga Chapter Notifier
# Cloudflare Pages + Functions + D1

name = "mangachapterweb"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "mangachapter-db"
database_id = "76305911-a6dc-4caa-84c9-86f5d5071107"

# Environment variables (non-secret)
[vars]
APP_NAME = "Manga Chapter Notifier"
APP_VERSION = "1.0.0"