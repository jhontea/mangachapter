# Nginx config untuk Manga Chapter Notifier
# Salin ke: /etc/nginx/sites-available/mangachapter
# Aktifkan: ln -s /etc/nginx/sites-available/mangachapter /etc/nginx/sites-enabled/
# Reload: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name manga.navisha.cloud;

    # Redirect HTTP ke HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name manga.navisha.cloud;

    # SSL — isi path setelah certbot dijalankan
    # certbot --nginx -d manga.navisha.cloud
    ssl_certificate     /etc/letsencrypt/live/manga.navisha.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manga.navisha.cloud/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Proxy ke app container (port hanya listen di localhost)
    location / {
        proxy_pass         http://127.0.0.1:8070;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Cache static assets
    location /static/ {
        proxy_pass         http://127.0.0.1:8070;
        proxy_cache_valid  200 1d;
        add_header         Cache-Control "public, max-age=86400";
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
    }
}
