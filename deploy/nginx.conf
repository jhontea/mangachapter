# Nginx config untuk Manga Chapter Notifier
# Salin ke: /etc/nginx/sites-available/mangachapter
# Aktifkan: ln -s /etc/nginx/sites-available/mangachapter /etc/nginx/sites-enabled/
# Reload: nginx -t && systemctl reload nginx

# LANGKAH 1: Gunakan blok HTTP ini dulu, jalankan certbot, baru ganti ke LANGKAH 2
# Setelah certbot selesai, hapus blok HTTP ini dan uncomment blok HTTPS di bawah

server {
    listen 80;
    server_name manga.navisha.cloud;

    location / {
        proxy_pass         http://127.0.0.1:8070;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /static/ {
        proxy_pass         http://127.0.0.1:8070;
        add_header         Cache-Control "public, max-age=86400";
    }

    location ~ /\. {
        deny all;
    }
}

